# ===========================
# Application Configuration
# ===========================
spring.application.name=service-connect-hub

# ===========================
# Server Configuration
# ===========================
server.address=0.0.0.0
server.port=${PORT:8080}

# ===========================
# PostgreSQL Configuration
# ===========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/service_connect_hub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# SQL Initialization
# ===========================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=${JWT_SECRET:replace-this-dev-secret-with-a-long-random-value}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===========================
# CORS Configuration
# ===========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===========================
# Admin Seed Configuration
# ===========================
app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.admin.phone=${APP_ADMIN_PHONE:1111111111}
app.admin.email=${APP_ADMIN_EMAIL:admin@serviceconnect.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}

# ===========================
# Logging
# ===========================
logging.level.com.serviceconnect=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
