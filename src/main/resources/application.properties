spring.application.name=service-connect-hub

server.address=0.0.0.0
server.port=${PORT:8080}

# ====================== Database Configuration ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Settings (Recommended for Railway)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ====================== JPA / Hibernate ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Removed explicit dialect (Spring Boot 3 + PostgreSQL auto-detects it)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent schema.sql / data.sql from running automatically
spring.sql.init.mode=never

# ====================== JWT Configuration ======================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ====================== CORS ======================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ====================== Admin Seed Data ======================
app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.admin.phone=${APP_ADMIN_PHONE:1111111111}
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

# ====================== Logging ======================
logging.level.com.serviceconnect=INFO
logging.level.org.springframework.security=INFO