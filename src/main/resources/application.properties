spring.application.name=service-connect-hub

server.address=0.0.0.0
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Disable schema.sql conflict
spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Admin Seed
app.admin.seed.enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.admin.phone=${APP_ADMIN_PHONE:1111111111}
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

# Logging
logging.level.com.serviceconnect=INFO
logging.level.org.springframework.security=INFO